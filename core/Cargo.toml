cargo-features = ["profile-rustflags"]

[package]
edition = "2021"
name = "zettl-core"
version = "0.1.0"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
objc = "0.2.7"
tauri = { version = "2", features = [] }

[profile.dev]
incremental = true

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "z"
rustflags = ["-Cdebuginfo=0"]
